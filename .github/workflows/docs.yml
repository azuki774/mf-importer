name: Document

on:
  push:
    branches:
      - main

jobs:
  doc:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tbls.yml
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: k1LoW/setup-tbls@f25e3d013a596865b2db90dac7ee19e9f15b5780 # v1.4.0
      - name: Wait for ready DB
        run: |
          until mysql -u root -ppassword -h 127.0.0.1 -e '\q'; do sleep 1; done
          echo "MariaDB is up!"
      - name: migration
        run: make migration
      - name: Run tbls for generate database document
        run: tbls doc

    services:
      db:
        image: mariadb:10.9
        ports:
          - 3306:3306
        env: 
          MYSQL_DATABASE: mfimporter
          MYSQL_ROOT_PASSWORD: password
          MYSQL_USER: user
          MYSQL_PASSWORD: pwd
          TZ: Asia/Tokyo
